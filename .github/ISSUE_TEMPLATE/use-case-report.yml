name: Use Case Report
description: Share how you used QuisKaizen on a real project
labels: ["use-case", "community"]
body:
  - type: textarea
    id: project
    attributes:
      label: What project did you apply QuisKaizen to?
      description: Brief description of the project and domain.
    validations:
      required: true
  - type: dropdown
    id: phases-used
    attributes:
      label: Which phases did you use?
      multiple: true
      options:
        - Phase 1 (Discover)
        - Phase 2 (Read Primaries)
        - Phase 3 (Synthesize)
        - Phase 4 (Cross-Examine)
        - Phase 5 (Distill)
        - Eval script
        - Mental model only
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: What were the results?
      description: Eval score, quality difference vs. Phase 1-only research, time spent, etc.
    validations:
      required: true
  - type: textarea
    id: surprises
    attributes:
      label: What surprised you?
      description: Anything unexpected — positive or negative.
